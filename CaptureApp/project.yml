name: CaptureApp
options:
  bundleIdPrefix: com.digitalgarden
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  CaptureApp:
    type: application
    platform: macOS
    sources:
      - path: CaptureApp
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalgarden.capture
        INFOPLIST_FILE: CaptureApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: CaptureApp/CaptureApp.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: CaptureApp/CaptureApp.entitlements
